<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <title>happy 13th courtsary 💙</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #050a15;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      padding: 12px;
      margin: 0;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 500px;
      aspect-ratio: 1 / 1.2;
      border-radius: 42px;
      background: #0b1221;
      box-shadow: 0 20px 40px rgba(0, 5, 20, 0.9), 0 0 0 1px rgba(100, 180, 255, 0.2);
      overflow: hidden;
      backdrop-filter: blur(2px);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: pointer;
    }

    .instruction {
      position: absolute;
      bottom: 22px;
      left: 0;
      right: 0;
      text-align: center;
      color: #c3e0ff;
      text-shadow: 0 0 12px #3a7bd5, 0 0 25px #1e4b8a;
      font-weight: 400;
      font-size: 1.1rem;
      letter-spacing: 1px;
      pointer-events: none;
      transition: opacity 0.8s;
      z-index: 10;
      padding: 0 16px;
      word-break: break-word;
    }

    .letter-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(3, 8, 20, 0.92);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2.2s ease;
      z-index: 30;
      padding: 20px;
    }

    .letter-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .letter-card {
      max-width: 460px;
      width: 100%;
      max-height: 80%;
      background: rgba(12, 25, 45, 0.7);
      border: 1px solid rgba(80, 160, 255, 0.35);
      border-radius: 32px;
      padding: 24px 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 30px rgba(0,120,255,0.2);
      color: #d9ecff;
      overflow-y: auto;
      backdrop-filter: blur(8px);
      scrollbar-width: thin;
      scrollbar-color: #3a7bd5 #0a1a2f;
    }

    .letter-card::-webkit-scrollbar {
      width: 5px;
    }
    .letter-card::-webkit-scrollbar-track {
      background: #0a1a2f;
      border-radius: 10px;
    }
    .letter-card::-webkit-scrollbar-thumb {
      background: #3a7bd5;
      border-radius: 10px;
    }

    .letter-content {
      font-size: 0.95rem;
      line-height: 1.6;
      text-align: left;
      color: #e2f0ff;
      text-shadow: 0 1px 4px #0a1e3a;
      white-space: pre-line;
      word-break: break-word;
    }

    .letter-content p {
      margin-bottom: 1.2em;
    }

    .close-letter {
      margin-top: 18px;
      background: rgba(30, 70, 120, 0.7);
      border: 1px solid #5fa3ff;
      color: #e5f0ff;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 400;
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 12px #00000040;
      letter-spacing: 1px;
    }

    .close-letter:hover {
      background: #2a5a9c;
      box-shadow: 0 0 18px #3f93ff;
    }

    .restart-icon {
      position: absolute;
      bottom: 18px;
      right: 18px;
      background: rgba(10, 20, 40, 0.5);
      backdrop-filter: blur(6px);
      border: 1px solid #2e6cbf;
      color: #b8d6ff;
      width: 44px;
      height: 44px;
      border-radius: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      z-index: 25;
      opacity: 0;
      transition: opacity 0.8s, background 0.2s;
      pointer-events: none;
      box-shadow: 0 2px 12px #00000050;
    }

    .restart-icon.show {
      opacity: 1;
      pointer-events: auto;
    }

    .restart-icon:hover {
      background: #1e4580;
      color: white;
    }
  </style>
</head>
<body>
<div class="container">
  <canvas id="fireflyCanvas" width="500" height="600"></canvas>

  <div class="instruction" id="instructionText">
    Happy 13th courtsary my baby, I have 13 fireflies for you po, open it my surprise po ikaww 💙
  </div>

  <div class="letter-overlay" id="loveLetterOverlay">
    <div class="letter-card">
      <div class="letter-content" id="messageContent"></div>
    </div>
    <button class="close-letter" id="closeLetterBtn">close & read again 💙</button>
  </div>

  <div class="restart-icon" id="restartButton">↻</div>
</div>

<script>
  (function(){
    "use strict";

    const canvas = document.getElementById('fireflyCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const W = 500, H = 600;
    canvas.width = W; canvas.height = H;

    const instructionEl = document.getElementById('instructionText');
    const letterOverlay = document.getElementById('loveLetterOverlay');
    const messageContent = document.getElementById('messageContent');
    const restartBtn = document.getElementById('restartButton');
    const closeLetterBtn = document.getElementById('closeLetterBtn');

    const LONG_MESSAGE = `Hi po baby koooo happyyy 13th courtsary to ussss🥺 Grabe baby 1 year and 1 month na po akong nanliligaw po sayooo. At first di po ako makapaniwala na papayagan mo po ako manligaw eh kasi sino ba naman ako diba like di naman ako katalinuhan at wala rin naman itsura(yes po baby I know po that you'll say na di po totoo na di ako matalino and di ako pogi, so yes yes opo ikaw po masusunod^^). Still you let me prove that I'll be the one not just for a short time but for a lifetime. I will never get tired of waiting mahal ko haaa, I know you are still not ready and i'm not pressuring you to say "yes" to me. Label can wait, but I can't wait to see you in person baby ko🥺. Para maipadama ko pa lalo yung pagmamahal na gusto kong ibigay sayo. Mahal ko kahit kailan di po ako mag sasawang intindihin ka po haa kahit na dumating sa point na di na po tayo mag kaintindihan, I will stay and still try to understand you my love love🥺 and baby ko wag ka po sanang mag sawang intindihin ako haa, i'm trying my best to be better for you baby kooo. Baby I know I don't say it often but I just want you to know that you're so important to me, to the point you've become one of my top priorities. Di naman ako ganto dati eh, you've changed me a lot in a good way baby. Inalis mo yung dating ako na may bad habits, I could really tell that I was more happy now than before I met you Kaya baby i'm so very thankful that dumating ka sa buhay ko, it feels like a superhero movie eh and ikaw yung superhero ko na niligtas ako sa kadiliman ng buhay ko🥺. You made my life easier and lighter simula nung dumating ka po sa buhay ko🥺. I was wondering what would happen if di kita nakilala, maybe i'm still that old self doing things recklessly and not matured enough to fix myself. But here I am because of you baby i'm being better for myself naa, and I want to be a much better person for you as a partner. And baby, no matter what happens, I’ll always choose you. Hindi lang ngayon, kundi araw-araw. I may not be perfect, but I promise I’ll always try to love you the best way I can. I’m here for you—sa saya, sa lungkot, at sa lahat ng bagay na pagdadaanan natin. 

I'm sorry baby ko sa lahat ng pagkukulang at mga pagkakamali ko po sayo. I know I've been pasaway and I do things that you don't like, pero baby I'm really trying to change and be better, not just for you, but for myself din. Ayoko na bumalik sa dati, gusto ko yung version ko ngayon na mas maayos and dahil po yun sayo🥺. Thank you baby ko for being patient with me, for understanding me kahit minsan mahirap ako intindihin. Hindi ko man nasasabi lagi, pero sobrang naa-appreciate kita sa lahat ng ginagawa mo para sa’kin. And baby, I just want you to know na hindi lang kita mahal dahil masaya tayo. Mahal kita kahit may misunderstandings, kahit may mga araw na mahirap, kasi ikaw yung pipiliin ko palagi, sa maayos man o sa magulong mundo. I’ll keep proving myself to you every single day hanggang sa dumating yung time na ready ka na. Because loving you is something I’m willing to do for a lifetime. I love youuuu so muchhhhh babyy kooo. Again, happy 13th courtsary to usss 🥺 more courtsaries to come with you, palangga ko.💙😘`;

    const STATE = { JAR: 0, RELEASING: 1, FIREWORKS: 2, DONE: 3 };
    let currentState = STATE.JAR;
    
    let fireflies = [];
    let fireworksParticles = [];
    let releaseTriggered = false;
    let finaleTriggered = false;
    let letterShown = false;
    let explosionCooldown = 0;
    
    const fireworkColors = [
      '#4da6ff', '#6eb5ff', '#2a7fff',
      '#b38bff', '#d9b0ff', '#c77dff',
      '#ff99cc', '#ffb3d9', '#ff85c2',
      '#7ae2ff', '#a0d6ff', '#5fc3ff',
      '#f4a2c9', '#d0b2ff', '#ffcc99'
    ];

    const GRAVITY = 0.06;
    const FIREFLY_COUNT = 13;
    const POP_THRESHOLD = H * 0.2; // height at which fireflies explode

    const rand = (min, max) => Math.random() * (max - min) + min;
    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    function initFireflies() {
      fireflies = [];
      for (let i = 0; i < FIREFLY_COUNT; i++) {
        fireflies.push({
          x: rand(W*0.35, W*0.65),
          y: rand(H*0.58, H*0.78),
          vx: rand(-0.08, 0.08),
          vy: rand(-0.04, 0.04),
          size: rand(4.2, 7.5),
          glow: rand(10, 18),
          color: i < 5 ? '#3d8cff' : fireworkColors[randInt(0, fireworkColors.length-1)],
          phase: rand(0, 100),
          exploded: false,
        });
      }
    }

    function fullReset() {
      currentState = STATE.JAR;
      releaseTriggered = false;
      fireworksParticles = [];
      finaleTriggered = false;
      letterShown = false;
      explosionCooldown = 0;
      letterOverlay.classList.remove('show');
      restartBtn.classList.remove('show');
      instructionEl.style.opacity = '1';
      initFireflies();
    }

    function createExplosion(px, py, baseColor = null) {
      const color = baseColor || fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
      const count = randInt(28, 42);
      for (let i=0; i<count; i++) {
        const angle = rand(0, Math.PI*2);
        const speed = rand(1.6, 4.2);
        fireworksParticles.push({
          x: px, y: py,
          vx: Math.cos(angle)*speed,
          vy: Math.sin(angle)*speed - rand(0.2, 1.0),
          size: rand(2.5, 5.0),
          color: color,
          alpha: 1.0,
          life: 1.0,
          decay: rand(0.006, 0.014),
          blur: 10,
        });
      }
      for (let i=0; i<6; i++) {
        fireworksParticles.push({
          x: px, y: py,
          vx: rand(-2.5,2.5), vy: rand(-3, 0.8),
          size: rand(2, 3.5),
          color: '#aad0ff',
          alpha: 1.0, life: 1.0, decay: 0.012, blur: 12,
        });
      }
    }

    function triggerFinale() {
      if (finaleTriggered) return;
      finaleTriggered = true;
      for (let i=0; i<13; i++) {
        let x = rand(W*0.2, W*0.8);
        let y = rand(H*0.15, H*0.5);
        createExplosion(x, y, fireworkColors[i % fireworkColors.length]);
      }
      for (let i=0; i<8; i++) {
        let blueShade = i%2===0 ? '#4da6ff' : '#7ab8ff';
        createExplosion(rand(W*0.15, W*0.85), rand(H*0.1, H*0.45), blueShade);
      }
      setTimeout(() => {
        if (!letterShown) showLoveLetter();
      }, 3000);
    }

    function showLoveLetter() {
      letterShown = true;
      messageContent.innerText = LONG_MESSAGE;
      letterOverlay.classList.add('show');
      restartBtn.classList.add('show');
      instructionEl.style.opacity = '0.3';
    }

    function releaseJar() {
      if (currentState !== STATE.JAR) return;
      currentState = STATE.RELEASING;
      releaseTriggered = true;
      instructionEl.style.opacity = '0.5';
      // Give each firefly a steady upward velocity (no gravity applied later)
      fireflies.forEach(f => {
        f.vy = rand(-1.8, -1.2); // negative = upward
        f.vx += rand(-0.2, 0.2);
      });
    }

    // UPDATED: fireflies rise continuously, pop when high enough
    function updateReleasing() {
      // Move fireflies upward (no gravity, just constant upward + small drag)
      for (let f of fireflies) {
        f.x += f.vx;
        f.y += f.vy;
        // slight drag to keep horizontal motion calm
        f.vx *= 0.995;
        // very slight upward acceleration to ensure they keep rising
        f.vy += 0.008; // small boost instead of gravity
        f.phase += 0.02;
      }

      // Check which fireflies are ready to pop (above threshold)
      const candidates = fireflies.filter(f => !f.exploded && f.y < POP_THRESHOLD);
      
      if (candidates.length > 0 && explosionCooldown <= 0) {
        // Pop the highest one (lowest y) for a nice sequential effect
        candidates.sort((a, b) => a.y - b.y);
        const f = candidates[0];
        f.exploded = true;
        createExplosion(f.x, f.y, f.color);
        explosionCooldown = 8; // frames between pops
      }
      
      if (explosionCooldown > 0) explosionCooldown--;

      // Remove exploded fireflies
      fireflies = fireflies.filter(f => !f.exploded);

      // When all fireflies have popped, move to FIREWORKS state and trigger finale
      if (fireflies.length === 0 && currentState === STATE.RELEASING) {
        currentState = STATE.FIREWORKS;
        setTimeout(() => {
          if (!finaleTriggered) triggerFinale();
        }, 600);
      }
    }

    function updateFireworks() {
      for (let i=fireworksParticles.length-1; i>=0; i--) {
        const p = fireworksParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += GRAVITY;
        p.vx *= 0.99;
        p.vy *= 0.99;
        p.life -= p.decay;
        p.alpha = p.life * 0.85;
        if (p.life <= 0.02 || p.y > H+30 || p.x < -30 || p.x > W+30) {
          fireworksParticles.splice(i,1);
        }
      }
      if (currentState === STATE.FIREWORKS && fireworksParticles.length === 0 && finaleTriggered) {
        currentState = STATE.DONE;
        restartBtn.classList.add('show');
      }
    }

    function updateJar() {
      for (let f of fireflies) {
        f.x += f.vx;
        f.y += f.vy;
        const left = W*0.28, right = W*0.72, top = H*0.48, bottom = H*0.82;
        if (f.x < left) { f.x = left; f.vx *= -0.3; }
        if (f.x > right) { f.x = right; f.vx *= -0.3; }
        if (f.y < top) { f.y = top; f.vy *= -0.2; }
        if (f.y > bottom) { f.y = bottom; f.vy *= -0.3; }
        f.vx += rand(-0.01, 0.01);
        f.vy += rand(-0.01, 0.01);
        const maxSpeed = 0.3;
        let sp = Math.hypot(f.vx, f.vy);
        if (sp > maxSpeed) { f.vx *= maxSpeed/sp; f.vy *= maxSpeed/sp; }
        f.phase += 0.02;
      }
    }

    function drawBackground() {
      const grad = ctx.createLinearGradient(0,0,0,H);
      grad.addColorStop(0, '#07101e');
      grad.addColorStop(0.7, '#0e1a30');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#c3ddff';
      for (let i=0;i<45;i++) {
        let sx = (i*23)%W, sy = (i*17)%H;
        ctx.globalAlpha = 0.3 + 0.2*Math.sin(Date.now()*0.001+i);
        ctx.beginPath();
        ctx.arc(sx, sy, 1, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1.0;
    }

    function drawJar() {
      ctx.save();
      ctx.shadowColor = '#4a8cbd';
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.ellipse(W/2, H*0.66, W*0.2, H*0.16, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(18, 35, 60, 0.3)';
      ctx.fill();
      ctx.strokeStyle = '#7aa9d9';
      ctx.lineWidth = 2.2;
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(W/2, H*0.49, W*0.11, H*0.045, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(20, 40, 70, 0.35)';
      ctx.fill();
      ctx.strokeStyle = '#8fb3e3';
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(W/2, H*0.45, W*0.12, H*0.035, 0, 0, Math.PI*2);
      ctx.fillStyle = '#2e4d73';
      ctx.fill();
      ctx.strokeStyle = '#6f9fcf';
      ctx.lineWidth = 1.8;
      ctx.stroke();
      ctx.restore();
    }

    function drawFireflies() {
      for (let f of fireflies) {
        ctx.shadowColor = f.color;
        ctx.shadowBlur = f.glow + 3*Math.sin(Date.now()*0.004+f.phase);
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.size*0.7, 0, 2*Math.PI);
        ctx.fillStyle = f.color;
        ctx.fill();
        ctx.shadowBlur = f.glow*1.4;
        ctx.beginPath();
        ctx.arc(f.x-1, f.y-1, f.size*0.4, 0, 2*Math.PI);
        ctx.fillStyle = '#e3f0ff';
        ctx.fill();
        if (currentState === STATE.RELEASING) {
          ctx.shadowBlur = 12;
          ctx.globalAlpha = 0.25;
          ctx.beginPath();
          ctx.arc(f.x - f.vx*2, f.y - f.vy*2, f.size*0.5, 0, 2*Math.PI);
          ctx.fillStyle = f.color;
          ctx.fill();
          ctx.globalAlpha = 1.0;
        }
      }
      ctx.shadowBlur = 0;
    }

    function drawFireworks() {
      for (let p of fireworksParticles) {
        ctx.globalAlpha = p.alpha;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = p.blur;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, 2*Math.PI);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.shadowBlur = p.blur*1.3;
        ctx.beginPath();
        ctx.arc(p.x-1, p.y-1, p.size*0.5, 0, 2*Math.PI);
        ctx.fillStyle = '#f0f8ff';
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1.0;
    }

    function draw() {
      drawBackground();
      if (currentState === STATE.JAR || currentState === STATE.RELEASING) {
        drawJar();
        drawFireflies();
      }
      if (currentState === STATE.FIREWORKS || currentState === STATE.DONE) {
        drawFireworks();
        ctx.font = "300 12px 'Segoe UI'";
        ctx.fillStyle = '#b0d2ff';
        ctx.shadowColor = '#3f93ff';
        ctx.shadowBlur = 10;
        ctx.textAlign = "center";
        ctx.fillText('💙 1 year and 1 month 💙', W/2, H-20);
        ctx.shadowBlur = 0;
      }
    }

    function updateLoop() {
      if (currentState === STATE.JAR) updateJar();
      else if (currentState === STATE.RELEASING) updateReleasing();
      else if (currentState === STATE.FIREWORKS) updateFireworks();
      draw();
      requestAnimationFrame(updateLoop);
    }

    function handleCanvasClick() {
      if (currentState === STATE.JAR) releaseJar();
    }

    function init() {
      fullReset();
      messageContent.innerText = '';
      canvas.addEventListener('click', handleCanvasClick);
      restartBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        fullReset();
        letterOverlay.classList.remove('show');
      });
      closeLetterBtn.addEventListener('click', () => {
        letterOverlay.classList.remove('show');
      });
      updateLoop();
    }

    init();
  })();
</script>
</body>
</html>
